<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRCOBJ Exporter</title>
</head>

<body>

    <script src="./utils.js"></script>
    <script src="../src/vendor/draco_encoder.js"></script>

    <script type="module">

        import * as THREE from "../node_modules/three/build/three.module.js";
        import { DrcobjExporter } from "../src/drcobj_exporter.module.js";

        (new THREE.ObjectLoader()).load("bunny.json", function (object) {

            let buffer = (new DrcobjExporter()).parse(object.toJSON());

            saveArrayBuffer(buffer, "bunny.drcobj");

        });

    </script>

</body>

</html>
